<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FF5722" />
  <meta name="description" content="Volleybal app voor Nederlandse verenigingen" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>VolleyApp</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏐</text></svg>" />
  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/training-planner.css" />
  <link rel="stylesheet" href="/css/training-module.css" />
  <link rel="stylesheet" href="/css/help.css" />
  <link rel="stylesheet" href="/css/scout.css" />

  <!-- CDN Libraries -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Cookie Consent (vanilla-cookieconsent v3 — GDPR/AVG compliant) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vanilla-cookieconsent@3/dist/cookieconsent.css" />
</head>
<body>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- App shell: shown when logged in -->
<div id="app" class="app-shell hidden">
  <!-- App Header -->
  <header class="app-header">
    <span class="logo">🏐 VolleyApp</span>
    <span class="page-title" id="header-title">Home</span>
    <div class="header-actions">
      <div id="header-more-wrap" class="header-gear-wrap hidden">
        <button type="button" class="header-action header-action--hamburger" id="header-more-btn" title="Menu" aria-haspopup="true" aria-expanded="false" aria-controls="header-more-menu">
          <span class="header-hamburger-icon" aria-hidden="true"><span></span><span></span><span></span></span>
        </button>
        <div id="header-more-menu" class="header-gear-menu hidden" role="menu" aria-hidden="true"></div>
      </div>
      <button type="button" class="header-action header-action--profile" id="header-profile-btn" title="Profiel">👤</button>
    </div>
  </header>

  <!-- Page container -->
  <main id="page-container" class="page">
    <div class="spinner"></div>
  </main>

  <!-- Bottom navigation -->
  <nav class="bottom-nav">
    <button class="nav-item" data-route="home">
      <span class="nav-icon">🏠</span>
      <span>Home</span>
    </button>
    <button class="nav-item" data-route="matches">
      <span class="nav-icon">📅</span>
      <span>Wedstrijden</span>
    </button>
    <button class="nav-item" data-route="team-own">
      <span class="nav-icon">👕</span>
      <span>Team</span>
    </button>
    <button class="nav-item" data-route="social">
      <span class="nav-icon">💬</span>
      <span>Sociaal</span>
    </button>
    <button class="nav-item" data-route="carpool">
      <span class="nav-icon">🚗</span>
      <span>Carpool</span>
    </button>
  </nav>
</div>

<!-- Auth screen: shown when logged out -->
<div id="auth-screen">
  <div class="auth-page">
    <div class="auth-logo">🏐 VolleyApp</div>
    <p class="auth-tagline">Jouw clubapp voor Nederlandse volleybal</p>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Inloggen</button>
        <button class="auth-tab" data-tab="register">Registreren</button>
      </div>

      <!-- Login form -->
      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="login-email">E-mailadres</label>
          <input class="form-input" type="email" id="login-email" name="email" placeholder="jij@voorbeeld.nl" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Wachtwoord</label>
          <input class="form-input" type="password" id="login-password" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Inloggen</button>
      </form>

      <!-- Register form -->
      <form id="register-form" class="hidden" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="reg-name">Je naam</label>
          <input class="form-input" type="text" id="reg-name" name="name" placeholder="Voornaam Achternaam" required autocomplete="name" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">E-mailadres</label>
          <input class="form-input" type="email" id="reg-email" name="email" placeholder="jij@voorbeeld.nl" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Wachtwoord</label>
          <input class="form-input" type="password" id="reg-password" name="password" placeholder="Minimaal 6 tekens" required autocomplete="new-password" minlength="6" />
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-club">Vereniging (optioneel)</label>
          <select class="form-select" id="reg-club" name="club_id">
            <option value="">— Kies je vereniging —</option>
          </select>
          <p class="form-hint">Staat je vereniging er niet tussen? Vraag een beheerder om deze toe te voegen.</p>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Account aanmaken</button>
      </form>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<script src="/js/app.js?v=212" type="module"></script>
<script>
  // Suppress bekende niet-app fouten (extensions, camera-context)
  window.addEventListener('unhandledrejection', function(e) {
    var msg = e.reason && (e.reason.message || String(e.reason));
    if (!msg) return;
    if (msg.indexOf('Permissions check failed') !== -1) return e.preventDefault();
    if (msg.indexOf('Could not establish connection') !== -1 && msg.indexOf('Receiving end does not exist') !== -1) return e.preventDefault();
  });
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    });
  }
</script>

<!-- Cookie Consent initialisation (loaded last so app renders first) -->
<script src="https://cdn.jsdelivr.net/npm/vanilla-cookieconsent@3/dist/cookieconsent.umd.js"></script>
<script>
  CookieConsent.run({
    // Persist consent for 365 days
    cookie: { name: 'volleyapp_cc', expiresAfterDays: 365 },

    guiOptions: {
      consentModal: {
        layout: 'box inline',
        position: 'bottom right',
        equalWeightButtons: false,
        flipButtons: false,
      },
      preferencesModal: {
        layout: 'box',
        equalWeightButtons: true,
        flipButtons: false,
      },
    },

    categories: {
      necessary: {
        // Functional cookies are always on — no opt-out under AVG art. 5(3) e-Privacyrichtlijn
        enabled: true,
        readOnly: true,
      },
    },

    language: {
      default: 'nl',
      autoDetect: 'browser',
      translations: {
        nl: {
          consentModal: {
            title: '🍪 Deze app gebruikt cookies',
            description:
              'We gebruiken uitsluitend <strong>functionele cookies</strong> — noodzakelijk om in te loggen en de app te laten werken. ' +
              'Er worden geen tracking- of advertentiecookies geplaatst. ' +
              '<a href="#" onclick="navigate(\'privacy\');CookieConsent.hide();return false;" style="color:var(--primary)">Lees ons privacybeleid</a>.',
            acceptAllBtn: 'Begrepen',
            showPreferencesBtn: 'Meer informatie',
          },
          preferencesModal: {
            title: 'Cookievoorkeuren',
            acceptAllBtn: 'Alles accepteren',
            savePreferencesBtn: 'Opslaan',
            closeIconLabel: 'Sluiten',
            sections: [
              {
                title: 'Wat zijn cookies?',
                description:
                  'Cookies zijn kleine tekstbestanden die worden opgeslagen in uw browser. ' +
                  'Deze app plaatst uitsluitend technisch noodzakelijke cookies voor de werking van de applicatie.',
              },
              {
                title: 'Functionele cookies <span class="pm__badge">Altijd actief</span>',
                description:
                  'Deze cookies zijn vereist om in te loggen, uw sessie bij te houden en de app te laten functioneren. ' +
                  'Zonder deze cookies werkt de app niet. Er worden geen persoonsgegevens gedeeld met derden.',
                linkedCategory: 'necessary',
              },
              {
                title: 'Meer informatie',
                description:
                  'Vragen over ons cookiebeleid? Bekijk ons <a href="#" onclick="navigate(\'privacy\');CookieConsent.hide();return false;" style="color:var(--primary)">privacybeleid</a> ' +
                  'of neem contact op met de clubbeheerder.',
              },
            ],
          },
        },
      },
    },
  });
</script>
</body>
</html>
