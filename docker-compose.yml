services:

  # ─── Node.js app ─────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: volleyapp
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ./data:/app/data
      - uploads:/app/public/uploads
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Nginx reverse proxy (HTTP only — Cloudflare doet de TLS) ────────────────
  nginx:
    image: nginx:alpine
    container_name: volleyapp-nginx
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - app

  # ─── Cloudflare Tunnel ───────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: volleyapp-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx

volumes:
  uploads:
