services:

  # ─── Node.js app ─────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: volleyapp
    restart: unless-stopped
    env_file: .env          # laadt alle variabelen uit .env (JWT_SECRET, FACE_BLUR_*, etc.)
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./data:/app/data
      - uploads:/app/public/uploads
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/auth/me"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Nginx reverse proxy (HTTP only — Cloudflare doet de TLS) ────────────────
  nginx:
    image: nginx:alpine
    container_name: volleyapp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"           # tijdelijk extern bereikbaar voor testen zonder tunnel
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - app

  # ─── Cloudflare Tunnel ───────────────────────────────────────────────────────
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: volleyapp-tunnel
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run
  #   environment:
  #     TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - nginx

volumes:
  uploads:
